name: AI Test Agent Validation Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-ai-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for hotspot analysis

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ========================================
    # STRATEGY 1: Mutation Testing Gate
    # ========================================
    - name: "Strategy 1: Run Tests"
      run: pytest tests/ -v --tb=short

    - name: "Strategy 1: Code Coverage"
      run: pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=80

    - name: "Strategy 1: Mutation Testing"
      run: |
        mutmut run --paths-to-mutate=src/ || true
        mutmut results
      continue-on-error: true

    # ========================================
    # STRATEGY 2: Hotspot Analysis
    # ========================================
    - name: "Strategy 2: Regression Hotspot Analysis"
      run: python scripts/hotspot_analyzer.py

    # ========================================
    # STRATEGY 3: Governance Check
    # ========================================
    - name: "Strategy 3: Governance Validation"
      run: python scripts/governance_checker.py
